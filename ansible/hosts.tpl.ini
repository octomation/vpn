{{.VpnName}} ansible_host={{.VpnHost}}
{{.RelayName}} ansible_host={{.RelayHost}}
{{.GatewayName}} ansible_host={{.GatewayHost}}

[docker]
{{.VpnName}}
{{.RelayName}}
{{.GatewayName}}

[vpn]
{{.VpnName}}

[relay]
{{.RelayName}}

[gateway]
{{.GatewayName}}

[ubuntu]
{{.VpnName}}
{{.RelayName}}
{{.GatewayName}}

[ubuntu:vars]
ansible_user=root

[py3]
{{.VpnName}}
{{.RelayName}}
{{.GatewayName}}

[py3:vars]
