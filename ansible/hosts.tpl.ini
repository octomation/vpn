{{.VpnName}} ansible_host={{.VpnHost}}
{{.RelayName}} ansible_host={{.RelayHost}}
{{.GatewayName}} ansible_host={{.GatewayHost}}

[docker]
{{.VpnName}}
{{.RelayName}}
{{.GatewayName}}

[docker:vars]
vector_loki_endpoint={{.VectorLokiEndpoint}}
vector_loki_user={{.VectorLokiUser}}
vector_loki_api_key={{.VectorLokiApiKey}}
vector_prometheus_endpoint={{.VectorPrometheusEndpoint}}
vector_prometheus_user={{.VectorPrometheusUser}}
vector_prometheus_api_key={{.VectorPrometheusApiKey}}

[gateway]
{{.GatewayName}}

[gateway:vars]
relay_server_ip={{.RelayHost}}
mtproto_port={{.MTProtoPort}}
socks5_port={{.SOCKS5Port}}
gost_tls_port={{.GostTLSPort}}
mtg_domain={{.MTGDomain}}
socks5_user={{.SOCKS5User}}
socks5_password={{.SOCKS5Password}}

[relay]
{{.RelayName}}

[relay:vars]
gateway_server_ip={{.GatewayHost}}
mtproto_port={{.MTProtoPort}}
socks5_port={{.SOCKS5Port}}
gost_tls_port={{.GostTLSPort}}

[py3]
{{.VpnName}}
{{.RelayName}}
{{.GatewayName}}

[py3:vars]
ansible_python_interpreter=/usr/bin/python3

[ubuntu]
{{.VpnName}}
{{.RelayName}}
{{.GatewayName}}

[ubuntu:vars]
ansible_user=root

[vpn]
{{.VpnName}}
