- name: Install the pip
  apt:
    name: python3-pip
    state: present

- name: Install the Docker SDK
  pip:
    name: "docker>={{ docker_sdk_version }}"
    state: present
    break_system_packages: true

- name: Remove legacy docker-compose binary (if present)
  file:
    path: /usr/local/bin/docker-compose
    state: absent
