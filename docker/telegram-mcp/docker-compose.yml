services:
  session-init:
    build: .
    command: init
    profiles:
      - init
    stdin_open: true
    tty: true
    volumes:
      - session-data:/data
    env_file: .env

  mcp-server:
    build: .
    command: serve
    ports:
      - "${MCP_PORT:-8080}:${MCP_PORT:-8080}"
    volumes:
      - session-data:/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${MCP_PORT:-8080}/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  session-data:
